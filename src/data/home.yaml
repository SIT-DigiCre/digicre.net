about:
  content: |
     <p>芝浦工業大学の文化系サークルです。</p>
     <p>プログラミング、ゲーム開発、イラスト、3DCG、音楽（DTM）、動画制作、VTuberなど、幅広いジャンルでデジタルコンテンツの制作を行っています。</p>
activity:
  content: |
    <p>普段は部室やDiscordのVCなどで交流するほか、作品制作を行っています。毎週月曜に定例会があります。</p>
    <p>夏休みや春休み中に希望者で集まって合宿を行っています。デジクリ部員同士で交流を深めたり、色々な講座を実施してスキルアップをしたりする機会にもなっています。</p>
    <p>大宮祭や芝浦祭といった学内の文化祭への出展はもちろん、コミックマーケットやM3といった外部イベントにも数多く参加しています。</p>
