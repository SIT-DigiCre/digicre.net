team:
  content: |
    <p>デジクリにおける「班」とは、活動分野という意味合いです。デジクリ部員は各々が自由に所属する班を名乗っています。</p>
    <p>同じ班のデジクリ部員同士で交流するだけでなく、ときには複数の班でコラポレーションして作品を制作することもあります。</p>
