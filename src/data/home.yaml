learn_more:
  - title: 費用はいくらですか？
    content: |
      <p><strong>年間2,000円</strong>です。備品購入やイベントへの出展料などに使います。</p>
  - title: 兼部やアルバイトとの両立は可能ですか？
    content: |
      <p><strong>はい、両立可能</strong>です。ほかのサークルや部活動との掛け持ち、アルバイトをしながら活動するデジクリ部員も多数おります。</p>
  - title: 部員数はどれくらいですか？
    content: |
      <p>2026年5月現在、<strong>学部生・大学院生を合わせて234名のデジクリ部員が活動</strong>しています。なお、過去 3 年間の部員数は、下表の通りです。</p>
      <table>
        <thead>
          <tr>
            <th>年度</th>
            <th>男子</th>
            <th>女子</th>
            <th>合計</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2026</td>
            <td>181</td>
            <td>53</td>
            <td>234</td>
          </tr>
          <tr>
            <td>2025</td>
            <td>183</td>
            <td>36</td>
            <td>219</td>
          </tr>
          <tr>
            <td>2024</td>
            <td>97</td>
            <td>19</td>
            <td>116</td>
          </tr>
        </tbody>
      </table>
  - title: 定例会とは何ですか？
    content: |
      <p><strong>毎週月曜21:00にオンラインで行っているミーティングのこと</strong>です。デジクリ部員全体への連絡、企画の進捗報告、初心者講座、LT（ライトニングトーク）などを行います。</p>
  - title: 定例会への参加は必須ですか？
    content: |
      <p><strong>いいえ、参加は任意</strong>です。なお、毎回の定例会で議事録や録画を残しているため、後から内容を確認できるようになっています。</p>
  - title: 上記以外で質問したいことがあります。どうすれば良いですか？
    content: |
      <p>デジクリの<a href="https://x.com/sitdigicre" target="_blank">公式X（Twitter）</a>宛にDMをお送りいただくか、メールでお問い合わせください。</p>
