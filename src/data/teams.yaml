- id: dtm
  name: DTM班
  about:
    content: |
      <p>DTM班では、主にパソコンを用いた音楽制作をしています。</p>
      <p>パソコンと電子機器、楽器などを用いて楽曲やゲームに使用するBGMの提供などをしています。</p>
  activity:
    content: |
      <p>複数人で既存の曲をアレンジしたものをリレー形式でつないでいく「アレンジリレー企画」やみんなで曲を作ってアルバムにして販売する「アルバム企画」、24時間以内の限られた時間で楽曲を制作する「n時間DTM企画」などがあります。</p>
    works:
      - title: アレンジリレー企画
