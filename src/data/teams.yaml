- id: 3dcg
  name: 3DCG班
  about:
    content: |
      <p>3DCG班では、Blenderなどのソフトを用いて3Dモデルを制作していたりしています。</p>
      <p>人型のモデルだけでなく小物や部屋など様々なモデルを制作しています。</p>
  activity:
    content: |
      <p>各々のやり方で各々の作りたい人を作る「3DCGで人を創ろう」などの企画をしています。</p>
    works:
      - title: 3DCGで人を創ろう企画
