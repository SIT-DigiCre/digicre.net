- id: pg
  name: PG班
  about:
    content: |
      <p>PG班では、プログラミングによる創作をしています。</p>
      <p>ゲーム開発やアプリ開発の他にもWeb開発やマイコン、Raspberry Piなどを用いた開発や機械学習といった様々な分野があります。</p>
  activity:
    content: |
      <p>各々でなんでもアリなおもちゃを開発する「PGおもちゃ企画」、イラスト班やDTM班と協力してゲーム開発を行う「ゲームジャム企画」や「ゲーム制作企画」などがあります。</p>
      <p>他にもデジクリを支える「デジコア」や「Bolide」などのシステム開発もしています。</p>
    works:
      - title: ゲーム制作企画
        image: foo.png
        href: null
      - title: PGおもちゃ企画
        image: foo.png
        href: null
  learn_more:
    - title: タイトル
      content: |
        <p>ここに内容を入力</p>

- id: 2dcg
  name: イラスト班
  about:
    content: |
      <p>イラスト班では、主にパソコンやタブレットなどを使ったデジタルイラストの制作をしています。</p>
      <p>様々なキャラクターを描いたイラストの制作の他にも技術向上を目的とした模写などをしています。</p>
  activity:
    content: |
      <p>テーマに合わせたイラストをみんなで書いて合同誌にする「デジクリイラスト合同誌企画」やみんなで模写をする「模写会企画」などがあります。</p>
    works:
      - title: 模写会企画
        image: foo.png
        href: null
      - title: 合同誌企画
